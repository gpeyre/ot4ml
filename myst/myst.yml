version: 1

project:
  id: ot4ml-web
  title: Optimal Transport for Machine Learners
  subtitle: Executable web book prototype
  description: A MyST/Jupyter Book 2 prototype that fuses the OT4ML text with executable figure notebooks.
  authors:
    - name: Gabriel Peyre
  github: https://github.com/gpeyre/ot4ml
  jupyter:
    server:
      url: http://localhost:8888/
      token: ot4ml-local
    kernelName: python3
  license:
    content: MIT
  bibliography:
    - ../latex/all.bib
  toc:
    - file: index.md
    - title: Chapters
      children:
        - file: chapters/matching.md
  math:
    \RR: \mathbb{R}
    \NN: \mathbb{N}
    \PP: \mathbb{P}
    \EE: \mathbb{E}
    \X: \mathcal{X}
    \Y: \mathcal{Y}
    \al: \alpha
    \be: \beta
    \ga: \gamma
    \de: \delta
    \la: \lambda
    \eps: \varepsilon
    \norm:
      macro: '\left\lVert #1 \right\rVert'
    \dotp:
      macro: '\left\langle #1,#2 \right\rangle'
    \argmin: \operatorname*{arg\,min}
    \umin: \operatorname*{min}
    \Wass: \mathcal{W}
    \MK: \mathcal{L}
    \CouplingsD: \mathbf{U}
    \Perm: \mathrm{Perm}

site:
  template: book-theme
  title: OT4ML Web
  options:
    logo_text: OT4ML
