version: 1

project:
  id: ot4ml-web
  title: Optimal Transport for Machine Learners
  description: An interactive web version of OT4ML that pairs the book text with figures and browser-native parameter panels.
  authors:
    - name: Gabriel Peyre
  bibliography:
    - ../latex/all.bib
  static_files:
    - live
    - ot4ml-sidebar.js
    - favicon.ico
    - favicon.svg
    - apple-touch-icon.png
  toc:
    - file: index.md
    - title: Chapters
      children:
        # Keep this list in the same order as the 14 \input{sections/...}
        # entries in ../latex/OT4ML.tex.
        - file: chapters/matching.md
        - file: chapters/monge.md
        - file: chapters/kantorovich.md
        - file: chapters/dual.md
        - file: chapters/semidiscrete-w1.md
        - file: chapters/dual-norms.md
        - file: chapters/sinkhorn.md
        - file: chapters/sinkhorn-advanced.md
        - file: chapters/generalized-wasserstein.md
        - file: chapters/generalized-ot-problems.md
        - file: chapters/beyond-comparing-measures.md
        - file: chapters/dynamic-ot.md
        - file: chapters/wasserstein-gradient-flows.md
        - file: chapters/transportation-models.md
    - file: conclusion.md
    - file: notation-table.md
    - file: book-index.md
